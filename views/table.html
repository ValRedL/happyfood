<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Food Restaurant - เลือกโต๊ะ</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/db-client.js" defer></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                'hf-green': '#A3B18A', 'hf-green-dark': '#344E41',
                'hf-green-light': '#E9EDC9', 'hf-bg': '#F8F9FA',
            }}}
        }
        const t = {
            th: { title:'เลือกมุมโปรดของคุณ', sub:'กรุณาเลือกโต๊ะที่ต้องการด้านล่าง', vacant:'ว่าง', occupied:'ไม่ว่าง', cleaning:'กำลังทำความสะอาด', selected:'เลือกแล้ว', select:'เลือกโต๊ะนี้', full:'เต็มแล้ว', cleaning_btn:'กำลังจัดโต๊ะ', next:'ดำเนินการต่อ', chef:'แผงควบคุมเชฟ', reviews:'รีวิว', reviewsTitle:'รีวิวจากลูกค้า', reviewsEmpty:'ยังไม่มีรีวิว', reviewsLoadFail:'โหลดรีวิวไม่สำเร็จ', avgScore:'คะแนนเฉลี่ย', latestReviews:'รีวิวล่าสุด', anonymousReview:'ลูกค้าให้คะแนนโดยไม่ได้เขียนข้อความเพิ่มเติม', table:'โต๊ะ' },
            en: { title:'Choose Your Spot', sub:'Please select your preferred table below.', vacant:'Available', occupied:'Occupied', cleaning:'Cleaning', selected:'Selected', select:'Select Table', full:'Occupied', cleaning_btn:'Cleaning', next:'Continue', chef:'Chef Panel', reviews:'Reviews', reviewsTitle:'Customer Reviews', reviewsEmpty:'No reviews yet', reviewsLoadFail:'Failed to load reviews', avgScore:'Average Rating', latestReviews:'Latest Reviews', anonymousReview:'Customer left a rating without additional comments', table:'Table' },
        };
        let lang = 'th', selectedId = null;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap');
        body { font-family:'Noto Sans Thai',sans-serif; background:#F8F9FA; }
        .table-card { transition:all .3s ease; border:2px solid transparent; cursor:pointer; }
        .table-card:hover:not(.disabled) { transform:translateY(-6px); border-color:#A3B18A; box-shadow:0 16px 32px -8px rgba(163,177,138,.25); }
        .table-card.selected { border-color:#A3B18A; box-shadow:0 12px 24px -6px rgba(163,177,138,.3); }
        .disabled { cursor:not-allowed; opacity:.75; pointer-events: none; }
        .img-dim { filter:grayscale(80%) opacity(.5); }
        .table-illustration {
            width: 8rem;
            height: 8rem;
            object-fit: contain;
            transition: all .3s ease;
        }
        .table-card.pending-selected {
            background: #344E41 !important;
            border-color: #344E41 !important;
            box-shadow: 0 12px 24px -6px rgba(52,78,65,.35);
        }
        .table-card.pending-selected h2 { color: #fff !important; }
        .table-card.pending-selected .card-emoji { filter: none; }
        @keyframes pulse-green { 0%,100%{ box-shadow:0 0 0 0 rgba(163,177,138,.4); } 50%{ box-shadow:0 0 0 12px rgba(163,177,138,0); } }
        .selected { animation:pulse-green 2s infinite; }
    </style>
</head>
<body class="min-h-screen pb-32">

<nav class="navbar bg-white/90 backdrop-blur-md sticky top-0 z-50 px-4 md:px-12 border-b border-gray-100 shadow-sm">
    <div class="flex-1">
        <a class="text-2xl font-bold text-neutral">Happy<span class="text-hf-green">Food</span> Restaurant</a>
    </div>
    <div class="flex-none gap-3 items-center">
        <div class="join border border-gray-200 rounded-full overflow-hidden">
            <button id="btn-th" onclick="setLang('th')" class="btn btn-xs md:btn-sm join-item bg-hf-green-light border-none font-bold">TH</button>
            <button id="btn-en" onclick="setLang('en')" class="btn btn-xs md:btn-sm join-item bg-transparent border-none">EN</button>
        </div>
        <button id="btn-reviews" onclick="openReviewsModal()" class="btn btn-sm rounded-full bg-hf-green-light border-none text-hf-green-dark font-bold hover:bg-hf-green hover:text-white">⭐ รีวิว</button>
        <div class="tooltip tooltip-bottom" data-tip="แผงควบคุมเชฟ">
            <a href="/login" class="btn btn-ghost btn-circle avatar">
                <div class="w-9 rounded-full border-2 border-hf-green bg-hf-green-light flex items-center justify-center text-lg">👨‍🍳</div>
            </a>
        </div>
    </div>
</nav>

<main class="container mx-auto p-6 md:p-12">
    <header class="text-center mb-10">
        <h1 id="txt-title" class="text-4xl md:text-5xl font-extrabold text-neutral mb-3">เลือกมุมโปรดของคุณ</h1>
        <p id="txt-sub" class="text-lg text-gray-400 font-light">กรุณาเลือกโต๊ะที่ต้องการด้านล่าง</p>
    </header>

    <div class="flex justify-center gap-6 mb-10 p-4 rounded-2xl bg-white border border-gray-100 shadow-sm max-w-xs mx-auto">
        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-hf-green-light border border-hf-green"></div><span id="leg-vacant" class="text-xs font-medium">ว่าง</span></div>
        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-gray-300"></div><span id="leg-occupied" class="text-xs font-medium">ไม่ว่าง</span></div>
        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-hf-green-dark"></div><span id="leg-selected" class="text-xs font-medium">เลือกแล้ว</span></div>
    </div>

    <div id="table-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</main>

<div id="next-bar" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-xs hidden z-50 px-4">
    <button onclick="goToMenu()" class="btn btn-block bg-hf-green border-none text-white shadow-2xl rounded-full h-14 text-lg font-bold hover:bg-hf-green-dark transition-colors">
        <span id="txt-next">ดำเนินการต่อ</span>
        <span id="lbl-table" class="ml-2 font-bold opacity-80"></span>
    </button>
</div>

<dialog id="reviews-modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box bg-white rounded-t-3xl sm:rounded-3xl max-w-2xl p-0 overflow-hidden">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div>
                <h3 id="reviews-title" class="text-2xl font-black text-hf-green-dark">รีวิวจากลูกค้า</h3>
                <p class="text-sm text-gray-400 mt-1"><span id="reviews-average-label">คะแนนเฉลี่ย</span>: <span id="reviews-average-value" class="font-bold text-hf-green">0.0</span></p>
            </div>
            <form method="dialog">
                <button class="btn btn-ghost btn-circle btn-sm text-gray-500 hover:text-red-500">✕</button>
            </form>
        </div>
        <div class="p-6 max-h-[70vh] overflow-y-auto">
            <div id="reviews-list" class="space-y-4">
                <p class="text-gray-400 text-sm">ยังไม่มีรีวิว</p>
            </div>
        </div>
    </div>
</dialog>

<script>
let refreshInterval = null;
let lastTablesSignature = '';
let publicReviews = [];

// อ่านรายการโต๊ะล่าสุดจาก backend
// หน้าเลือกโต๊ะต้องเรียกซ้ำเรื่อย ๆ เพราะสถานะโต๊ะอาจถูกเปลี่ยนจากลูกค้าคนอื่นได้
async function getTables() {
    const response = await fetch('/tables');
    if (!response.ok) throw new Error('Failed to fetch tables');
    return response.json();
}

// ฟังก์ชันนี้รับ "ข้อมูลโต๊ะ 1 ตัว" แล้วแปลงเป็น HTML ของ card
// แยกเป็น helper จะทำให้ logic render แต่ละโต๊ะอ่านง่ายกว่าเขียนรวมไว้ใน renderMenu()
function getTableCardMarkup(id, info) {
    const isOccupied = info.status === 'occupied';
    const isCleaning = info.status === 'cleaning';
    const isDisabled = isOccupied || isCleaning;
    const isSelected = selectedId === id;

    // label และสีของ badge จะเปลี่ยนตามสถานะโต๊ะปัจจุบัน
    const statusLabel = isSelected
        ? t[lang].selected
        : isOccupied ? t[lang].occupied
        : isCleaning ? t[lang].cleaning
        : t[lang].vacant;

    const badgeColor = isSelected
        ? 'bg-white/20 text-white border border-white/30'
        : isOccupied ? 'bg-gray-300 text-gray-600'
        : isCleaning ? 'bg-yellow-100 text-yellow-700'
        : 'bg-hf-green-light text-hf-green-dark';

    const titleClass = isDisabled && !isSelected
        ? 'text-gray-300'
        : isSelected ? 'text-white' : 'text-neutral';

    const buttonHtml = isSelected
        ? `<button class="btn btn-sm btn-block bg-white/20 text-white border border-white/30 mt-3 rounded-xl backdrop-blur-sm">✓ ${t[lang].selected}</button>`
        : isOccupied
        ? `<button class="btn btn-sm btn-block btn-disabled mt-3 rounded-xl" disabled onclick="showOccupiedAlert('${id}')">${t[lang].full}</button>`
        : isCleaning
        ? `<button class="btn btn-sm btn-block bg-yellow-100 text-yellow-700 border-none mt-3 rounded-xl cursor-not-allowed" disabled>${t[lang].cleaning_btn}</button>`
        : `<button onclick="selectTable('${id}', this.closest('.table-card'))" class="btn btn-sm btn-block border-hf-green text-hf-green bg-white hover:bg-hf-green hover:text-white mt-3 rounded-xl transition-colors">${t[lang].select}</button>`;

    return {
        isDisabled,
        isSelected,
        html: `
            <figure class="px-6 pt-6 relative">
                <span class="absolute top-8 right-8 badge ${badgeColor} text-[10px] font-bold px-3 py-2">${statusLabel}</span>
                <img
                    src="/images/table/table-icon.jpeg"
                    alt="Table ${id}"
                    class="table-illustration ${isDisabled && !isSelected ? 'img-dim' : ''}"
                />
            </figure>
            <div class="card-body items-center text-center p-6 pt-3">
                <h2 class="card-title text-xl font-extrabold ${titleClass}">Table ${id}</h2>
                ${buttonHtml}
            </div>`
    };
}

// update เฉพาะ card ที่มีอยู่จริงในหน้า
// วิธีนี้ช่วยลดอาการกระพริบ เพราะเราไม่ล้างทั้ง grid ทุกครั้ง
function upsertTableCards(tables) {
    const grid = document.getElementById('table-grid');
    const entries = Object.entries(tables).sort(([a], [b]) => a.localeCompare(b));
    const seen = new Set();

    entries.forEach(([id, info]) => {
        seen.add(id);
        const cardState = getTableCardMarkup(id, info);
        let card = grid.querySelector(`[data-table-id="${id}"]`);

        if (!card) {
            card = document.createElement('div');
            card.dataset.tableId = id;
            grid.appendChild(card);
        }

        card.className = `card bg-white shadow-sm table-card ${cardState.isDisabled ? 'disabled' : ''} ${cardState.isSelected ? 'pending-selected' : ''}`;
        card.onclick = cardState.isDisabled ? null : () => selectTable(id, card);
        card.innerHTML = cardState.html;
    });

    Array.from(grid.querySelectorAll('[data-table-id]')).forEach(card => {
        if (!seen.has(card.dataset.tableId)) {
            card.remove();
        }
    });
}

async function renderMenu(force = false) {
    // ถึงชื่อฟังก์ชันจะชื่อ renderMenu แต่จริง ๆ หน้านี้คือ "render table selection"
    // โค้ดเดิมใช้ชื่อนี้มาตั้งแต่เวอร์ชันแรก เลยยังคงไว้เพื่อไม่ให้กระทบจุดอื่น
    const grid = document.getElementById('table-grid');

    let tables = {};
    try {
        tables = await getTables();
    } catch (e) {
        console.error("❌ Error fetching tables:", e);
        return;
    }

    const signature = JSON.stringify({
        selectedId,
        lang,
        tables: Object.entries(tables).sort(([a], [b]) => a.localeCompare(b))
    });

    // ถ้าข้อมูลโต๊ะยังเหมือนเดิมทุกอย่าง เราจะไม่ render ซ้ำ
    // จุดนี้สำคัญมาก เพราะช่วยลดการกระพริบของหน้าเวลา auto-refresh ทุก 3 วินาที
    if (!force && signature === lastTablesSignature) {
        return;
    }
    lastTablesSignature = signature;

    grid.innerHTML = '';

    if (!Object.keys(tables).length) {
        grid.innerHTML = `
            <div class="col-span-full text-center py-20 text-gray-400">
                <p class="text-2xl mb-2">🪑</p>
                <p class="text-lg">ไม่พบข้อมูลโต๊ะในระบบ</p>
                <p class="text-sm mt-2">กรุณาติดต่อ Admin เพื่อตั้งค่าโต๊ะ</p>
            </div>
        `;
        return;
    }

    upsertTableCards(tables);
}

// เมื่อผู้ใช้กดเลือกโต๊ะ เราไม่เชื่อข้อมูลที่อยู่บนหน้าทันที
// แต่จะ fetch สถานะโต๊ะล่าสุดจาก server อีกครั้งก่อน เพื่อกันกรณีมีคนอื่นเลือกโต๊ะนี้ไปก่อนหน้า
async function selectTable(id, el) {
    try {
        console.log(`🔍 Checking table ${id} status...`);
        const tables = await getTables();
        const tableStatus = tables[id];

        console.log(`Table ${id} status:`, tableStatus);

        // ถ้าโต๊ะมีคนใช้อยู่แล้ว ให้หยุด flow ทันที
        if (tableStatus && tableStatus.status === 'occupied') {
            console.warn(`⚠️ Table ${id} is occupied! Cannot select.`);
            showOccupiedAlert(id);
            return;
        }

        // ถ้าโต๊ะกำลัง cleaning ก็ยังไม่ให้ลูกค้าใหม่เข้าใช้
        if (tableStatus && tableStatus.status === 'cleaning') {
            console.warn(`⚠️ Table ${id} is cleaning!`);
            Swal.fire({
                title: '⏳ โต๊ะกำลังจัดเตรียม',
                text: 'กรุณารอสักครู่',
                icon: 'info',
                confirmButtonColor: '#A3B18A',
                confirmButtonText: 'ตกลง'
            });
            return;
        }

        // ถ้าโต๊ะว่างจริง ค่อยบันทึก selectedId แล้ว render หน้าใหม่เพื่อให้ card เปลี่ยนสี
        console.log(`✅ Table ${id} is available`);
        selectedId = id;
        await renderMenu(true);
        document.getElementById('next-bar').classList.remove('hidden');
        document.getElementById('lbl-table').innerText = `(Table ${id})`;
    } catch (e) {
        console.error("❌ Error checking table status:", e);
    }
}

// popup นี้ใช้ซ้ำเวลาผู้ใช้กดโต๊ะที่ไม่ว่าง
function showOccupiedAlert(tableId) {
    Swal.fire({
        title: '⚠️ โต๊ะนี้ถูกใช้อยู่',
        text: `Table ${tableId} มีลูกค้าใช้งานอยู่แล้ว\nกรุณาเลือกโต๊ะอื่น`,
        icon: 'warning',
        confirmButtonColor: '#A3B18A',
        confirmButtonText: 'ตกลง'
    });
}

// แปลงคะแนนเป็นดาว เช่น 4 -> ★★★★☆
function renderStars(rating) {
    const score = Number(rating || 0);
    return Array.from({ length: 5 }, (_, i) => i < score ? '★' : '☆').join('');
}

// render รีวิวสาธารณะที่หน้าเลือกโต๊ะ
// ลูกค้ายังไม่ต้อง login ก็เปิดดูรีวิวรวมของร้านได้
function renderPublicReviews(reviews) {
    const list = document.getElementById('reviews-list');
    const avgEl = document.getElementById('reviews-average-value');

    if (!reviews.length) {
        list.innerHTML = `<p class="text-gray-400 text-sm">${t[lang].reviewsEmpty}</p>`;
        avgEl.innerText = '0.0';
        return;
    }

    const average = (reviews.reduce((sum, review) => sum + Number(review.rating || 0), 0) / reviews.length).toFixed(1);
    avgEl.innerText = average;

    list.innerHTML = reviews.map(review => `
        <div class="rounded-2xl border border-gray-100 bg-hf-bg p-4">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <p class="text-lg font-black ${Number(review.rating) >= 4 ? 'text-green-600' : Number(review.rating) <= 2 ? 'text-red-500' : 'text-yellow-600'}">${renderStars(review.rating)}</p>
                    <p class="text-xs text-gray-500 mt-1">${t[lang].table} ${review.tableId || '-'}</p>
                </div>
                <div class="text-right text-xs text-gray-400">
                    <p>${review.orderId || '-'}</p>
                    <p>${new Date(review.createdAt).toLocaleString(lang === 'en' ? 'en-US' : 'th-TH')}</p>
                </div>
            </div>
            <div class="mt-3 rounded-xl bg-white p-4 border border-gray-100">
                <p class="text-sm text-neutral leading-7">${review.comment ? review.comment : t[lang].anonymousReview}</p>
            </div>
        </div>
    `).join('');
}

async function openReviewsModal() {
    // เปิด modal ก่อน แล้วค่อยโหลดข้อมูล
    // ผู้ใช้จะเห็นทันทีว่าระบบกำลังทำงาน ไม่รู้สึกว่าปุ่มกดแล้วเงียบ
    document.getElementById('reviews-title').innerText = t[lang].reviewsTitle;
    document.getElementById('reviews-average-label').innerText = t[lang].avgScore;
    document.getElementById('reviews-list').innerHTML = `<p class="text-gray-400 text-sm">${t[lang].latestReviews}...</p>`;
    document.getElementById('reviews-modal').showModal();

    try {
        publicReviews = await DB.getReviews();
        renderPublicReviews(publicReviews);
    } catch (e) {
        document.getElementById('reviews-list').innerHTML = `<p class="text-red-500 text-sm">${t[lang].reviewsLoadFail}</p>`;
    }
}

// ขั้นตอนก่อนเข้าหน้าเมนู:
// 1) lock โต๊ะให้เป็น occupied
// 2) สร้าง customer session
// 3) จำโต๊ะไว้ใน localStorage
// 4) redirect ไปหน้าเมนู
// ถ้าไม่ทำขั้นตอนนี้ก่อน ลูกค้า 2 คนอาจเข้ามาใช้โต๊ะเดียวกันพร้อมกันได้
async function goToMenu() {
    if (!selectedId) return;

    try {
        console.log(`📍 Locking table: ${selectedId}`);
        
        // ล็อกโต๊ะทันที เพื่อกันคนอื่นเลือกโต๊ะเดียวกันชนกัน
        const lockRes = await fetch(`/tables/${selectedId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'occupied' })
        });

        if (!lockRes.ok) throw new Error('Failed to lock table');
        console.log(`✅ Table ${selectedId} locked as occupied`);

        // สร้าง session ของลูกค้าชุดนี้ไว้ใช้เชื่อม order / payment / history
        const sessionRes = await fetch('/start-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ table_id: selectedId })
        });
        if (sessionRes.ok) {
            const { sessionId } = await sessionRes.json();
            localStorage.setItem('activeSessionId', sessionId);
            console.log(`✅ Session created: ${sessionId}`);
        }

        // จำโต๊ะที่เลือกไว้ใน browser เพื่อให้หน้าถัดไปรู้ว่า user อยู่โต๊ะไหน
        DB.set(DB.KEYS.SELECTED_TABLE, selectedId);

        // เมื่อทุกอย่างพร้อมแล้วค่อยไปหน้าเมนู
        window.location.href = '/menu-page';
    } catch (error) {
        console.error("❌ Error:", error);
        Swal.fire({
            title: 'เกิดข้อผิดพลาด',
            text: error.message || 'ไม่สามารถล็อกโต๊ะได้ กรุณาลองใหม่',
            icon: 'error',
            confirmButtonColor: '#A3B18A'
        });
    }
}

// initPage เป็นฟังก์ชัน setup หลักของหน้า table
// ทำหน้าที่เคลียร์สถานะค้างเก่า, ตรวจ session เดิม, แล้วเริ่ม auto-refresh
async function initPage() {
    console.log("🔄 Initializing table selection page...");
    
    // รอให้ frontend helper (DB client) โหลดเสร็จก่อน
    // เพราะหน้านี้ต้องใช้ localStorage ผ่าน DB helper
    let attempts = 0;
    while (typeof DB === 'undefined' && attempts < 100) {
        await new Promise(r => setTimeout(r, 50));
        attempts++;
    }

    if (typeof DB === 'undefined') {
        console.error("❌ DB failed to load");
        return;
    }

    const prevTable = DB.get(DB.KEYS.SELECTED_TABLE);
    const prevSession = localStorage.getItem('activeSessionId');

    console.log(`📝 Previous Table: ${prevTable}, Session: ${prevSession}`);

    // ถ้ายังมี session เดิมอยู่ แปลว่าลูกค้ากำลังใช้งานโต๊ะนี้ต่อเนื่อง
    // จึงพากลับไปหน้าเมนูเลย ไม่ต้องรีเซ็ตโต๊ะ
    if (prevTable && prevSession) {
        console.log(`✅ Session still active, redirecting to menu...`);
        window.location.href = '/menu-page';
        return;
    }

    // ถ้ามีโต๊ะค้างแต่ไม่มี session แล้ว แปลว่า state ใน browser ไม่สมบูรณ์
    // เราจะปล่อยโต๊ะกลับเป็น vacant เพื่อไม่ให้โต๊ะค้าง unusable
    if (prevTable && !prevSession) {
        try {
            console.log(`🔓 No session but table locked, releasing: ${prevTable}`);
            await fetch(`/tables/${prevTable}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'vacant', order_id: null })
            });
        } catch(e) { console.error("Release table error:", e); }
    }

    // เคลียร์สถานะใน browser ให้หน้าเริ่มจากศูนย์เสมอ
    DB.set(DB.KEYS.SELECTED_TABLE, null);
    DB.set(DB.KEYS.CURRENT_ORDER, null);
    localStorage.removeItem('activeSessionId');
    selectedId = null;

    console.log("✅ Page initialized, rendering tables...");
    await renderMenu(true);

    // หน้าเลือกโต๊ะต้อง update เรื่อย ๆ เพราะโต๊ะอาจเปลี่ยนสถานะจากเครื่องอื่น
    refreshInterval = setInterval(async () => {
        await renderMenu();
    }, 3000);
}

// สลับภาษาแล้ว render หน้าโต๊ะใหม่
// เพราะข้อความบน card เช่น badge / ปุ่ม ต้องเปลี่ยนตามภาษาเช่นกัน
function setLang(l) {
    lang = l;
    document.getElementById('txt-title').innerText = t[l].title;
    document.getElementById('txt-sub').innerText = t[l].sub;
    document.getElementById('leg-vacant').innerText = t[l].vacant;
    document.getElementById('leg-occupied').innerText = t[l].occupied;
    document.getElementById('leg-selected').innerText = t[l].selected;
    document.getElementById('txt-next').innerText = t[l].next;
    document.getElementById('btn-th').className = `btn btn-xs md:btn-sm join-item border-none font-bold ${l==='th'?'bg-hf-green-light':'bg-transparent'}`;
    document.getElementById('btn-en').className = `btn btn-xs md:btn-sm join-item border-none font-bold ${l==='en'?'bg-hf-green-light':'bg-transparent'}`;
    document.getElementById('btn-reviews').innerText = `⭐ ${t[l].reviews}`;
    if (document.getElementById('reviews-modal').open) {
        document.getElementById('reviews-title').innerText = t[l].reviewsTitle;
        document.getElementById('reviews-average-label').innerText = t[l].avgScore;
        renderPublicReviews(publicReviews);
    }
    renderMenu(true);
}

// กัน interval ค้างเมื่อผู้ใช้เปลี่ยนหน้า
window.addEventListener('beforeunload', () => {
    if (refreshInterval) {
        clearInterval(refreshInterval);
        console.log("✅ Refresh interval cleared");
    }
});

// จุดเริ่มต้นจริงของหน้าเลือกโต๊ะ
window.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
