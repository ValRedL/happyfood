<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการสั่งซื้อ - HappyFood</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/db-client.js" defer></script>
    <script>tailwind.config={theme:{extend:{colors:{
        'hf-green':'#A3B18A','hf-green-dark':'#344E41',
        'hf-green-light':'#E9EDC9','hf-bg':'#F8F9FA'
    }}}}</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap');
        body { font-family:'Noto Sans Thai',sans-serif; background:#F8F9FA; }
        .order-card { animation: fadeUp .35s ease-out both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .receipt-line { border-top: 1px dashed #e5e7eb; }
    </style>
</head>
<body class="min-h-screen pb-24">

<nav class="navbar bg-white border-b border-gray-100 px-6 sticky top-0 z-50 shadow-sm">
    <div class="flex-1 items-center gap-2">
        <button onclick="goBack()" class="btn btn-ghost btn-circle text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
            </svg>
        </button>
        <h1 class="text-xl font-bold text-neutral">ประวั<span class="text-hf-green">ติ</span></h1>
    </div>
    <div class="flex-none">
        <span id="order-count" class="badge badge-neutral font-bold px-3 py-2 hidden"></span>
    </div>
</nav>

<main class="container mx-auto max-w-xl p-5">
    <div class="mb-6">
        <h2 class="text-2xl font-black text-neutral">ประวัติการสั่งซื้อ</h2>
        <p class="text-sm text-gray-400 mt-1">บันทึกทุกมื้อที่คุณสั่งผ่านอุปกรณ์นี้</p>
    </div>

    <div id="loading" class="flex flex-col items-center justify-center py-20 text-hf-green">
        <span class="loading loading-spinner loading-lg mb-3"></span>
        <p class="text-sm text-gray-400">กำลังโหลดประวัติ...</p>
    </div>

    <div id="no-history" class="hidden text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm">
        <div class="text-7xl mb-4 opacity-30">🧾</div>
        <h3 class="text-xl font-bold text-gray-400 mb-2">ยังไม่มีประวัติการสั่งซื้อ</h3>
        <p class="text-sm text-gray-400 mb-6">เริ่ม���้นสั่งอาหารเพื่อดูประวัติที่นี่</p>
        <a href="/menu-page" class="btn bg-hf-green border-none text-white rounded-xl px-8">🍽️ สั่งอาหารเลย</a>
    </div>

    <div id="history-container" class="space-y-5"></div>
</main>

<script>
const PAY_LABEL = { promptpay:'Thai QR PromptPay', card:'บัตรเครดิต/เดบิต', cash:'เงินสด' };
const PAY_ICON  = { promptpay:'🏦', card:'💳', cash:'💵' };

// ✅ กลับไปหน้าเมนู
function goBack() {
    console.log("🔙 Going back to menu...");
    window.location.href = '/menu-page';
}

async function loadHistory() {
    console.log("📋 Loading order history...");
    
    if (typeof DB === 'undefined') {
        console.error("❌ DB not loaded");
        return;
    }

    const sessions = JSON.parse(localStorage.getItem('completedSessions') || '[]');
    const activeId = localStorage.getItem('activeSessionId');
    if (activeId && !sessions.includes(activeId)) sessions.push(activeId);

    const container = document.getElementById('history-container');
    const noHistory = document.getElementById('no-history');
    const loading   = document.getElementById('loading');
    const countBadge = document.getElementById('order-count');

    if (!sessions.length) {
        console.log("⚠️ No sessions found");
        loading.classList.add('hidden');
        noHistory.classList.remove('hidden');
        return;
    }

    try {
        console.log(`🔄 Fetching history for ${sessions.length} sessions...`);
        const history = await DB.getCustomerHistory(sessions);

        loading.classList.add('hidden');

        if (!history.length) {
            console.log("ℹ️ No orders found");
            noHistory.classList.remove('hidden');
            return;
        }

        console.log(`✅ Got ${history.length} orders`);
        countBadge.innerText = `${history.length} รายการ`;
        countBadge.classList.remove('hidden');
        container.innerHTML = history.map((order, i) => buildCard(order, i)).join('');

    } catch (e) {
        console.error("❌ Error loading history:", e);
        loading.classList.add('hidden');
        container.innerHTML = `
            <div class="bg-red-50 border border-red-100 rounded-2xl p-6 text-center text-red-400">
                <p class="text-2xl mb-2">⚠️</p>
                <p class="font-bold">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>
                <button onclick="location.reload()" class="btn btn-sm btn-outline border-red-200 text-red-400 mt-3 rounded-xl">ลองใหม่</button>
            </div>`;
    }
}

function buildCard(o, idx) {
    const date = new Date(o.created_at).toLocaleString('th-TH', {
        year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'
    });

    const isPaid = o.is_paid;
    const statusBadge = isPaid
        ? `<span class="badge badge-success text-white font-bold text-[11px]">ชำระแล้ว ✓</span>`
        : `<span class="badge badge-warning text-white font-bold text-[11px]">รอชำระเงิน</span>`;

    const itemsHtml = (o.items || []).length === 0
        ? `<p class="text-sm text-gray-300 italic py-2">ไม่พบรายการอาหาร</p>`
        : (o.items || []).map(item => `
            <div class="flex justify-between items-start gap-3 py-2.5 border-b border-dashed border-gray-100 last:border-0">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <span class="text-xl leading-none">${item.img || '🍽️'}</span>
                        <span class="font-semibold text-sm text-neutral">${item.name}</span>
                        <span class="text-gray-400 text-sm shrink-0">×${item.qty}</span>
                    </div>
                    ${item.toppings && item.toppings.length
                        ? `<p class="text-[11px] text-gray-400 mt-1 ml-7">${item.toppings.join(' · ')}</p>` : ''}
                    ${item.note
                        ? `<p class="text-[11px] text-hf-green mt-0.5 ml-7">📝 ${item.note}</p>` : ''}
                </div>
                <span class="text-sm font-bold text-neutral shrink-0">฿${parseFloat(item.totalPrice).toFixed(2)}</span>
            </div>`).join('');

    return `
        <div class="order-card bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden"
             style="animation-delay:${idx*0.06}s">

            <div class="bg-gradient-to-r from-hf-green-light/60 to-white px-6 py-4 flex justify-between items-start">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="badge badge-neutral font-bold text-[11px]">Table ${o.table_id}</span>
                        ${statusBadge}
                    </div>
                    <p class="text-xs text-gray-400">${date}</p>
                </div>
                <div class="text-right">
                    <p class="text-xl font-black text-hf-green">฿${parseFloat(o.total).toFixed(2)}</p>
                    ${isPaid
                        ? `<p class="text-[11px] text-gray-400">${PAY_ICON[o.payment_method]||'💰'} ${PAY_LABEL[o.payment_method]||o.payment_method||'-'}</p>`
                        : `<p class="text-[11px] text-yellow-500">⏳ ยังไม่ชำระ</p>`
                    }
                </div>
            </div>

            <div class="px-6 pt-4 pb-4">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">รายการอาหาร</p>
                ${itemsHtml}

                <div class="receipt-line mx-0 pt-3 space-y-1 mt-3">
                    <div class="flex justify-between text-xs text-gray-400">
                        <span>ยอดรวม (Subtotal)</span>
                        <span>฿${parseFloat(o.subtotal||0).toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between text-xs text-gray-400">
                        <span>ภาษีมูลค่าเพิ่ม (VAT 7%)</span>
                        <span>฿${parseFloat(o.vat_amount||0).toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between text-sm font-black pt-2 mt-1 border-t border-gray-100">
                        <span class="text-neutral">ยอดสุทธิ</span>
                        <span class="text-hf-green">฿${parseFloat(o.total).toFixed(2)}</span>
                    </div>
                </div>
            </div>
        </div>`;
}

document.addEventListener('DOMContentLoaded', async () => {
    console.log("📱 Order history page loading...");
    
    let attempts = 0;
    while (typeof DB === 'undefined' && attempts < 100) {
        await new Promise(r => setTimeout(r, 50));
        attempts++;
    }

    if (typeof DB === 'undefined') {
        console.error("❌ DB failed to load");
        return;
    }

    await loadHistory();
});
</script>
</body>
</html>
